<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>День рождения</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <h1>Birthday Bingo</h1>

    <div class="block" id="fact">
        <p class="little text">Факт:</p>
        <p class="big text">Вместе ели неприлично много сыра?</p>
    </div>
    <div class="block" id="name">
        <input class="little text" placeholder="Введи имя:" id="guestName"/>
        <button class="submit-btn" id="submitGuess">✓</button>
    </div>
    <div class="block" id="score">
        <p class="little text" id="score_num">Очки: 0</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
